<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacén de vehículos</title>
</head>
<body>
    <h1>Almacén de Vehículos</h1>

    <form id="formulario">
        <div>
            <label for="placa">Placa:</label>
            <input type="text" id="placa" name="placa">
        </div>
        <div>
            <label for="marca">Marca:</label>
            <input type="text" id="marca" name="marca">
        </div>
        <div>
            <label for="modelo">Modelo:</label>
            <input type="text" id="modelo" name="modelo">
        </div>
    </form>

    <div>
        <button type="button" id="btnAgregar">Agregar vehículo</button>
        <button type="button" id="btnListar">Listar vehículos</button>
        <button type="button" id="btnBuscar">Buscar por placa</button>
    </div>

    <h3>Lista:</h3>
    <div id="lista"></div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
